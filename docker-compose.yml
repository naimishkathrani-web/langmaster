services:
  langmaster-backend:
    build:
      context: ./backend
    container_name: langmaster-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - AUTH_TOKEN_SECRET=dev-secret-change-me
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/health"]
      interval: 20s
      timeout: 5s
      retries: 3
    restart: unless-stopped
